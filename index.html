<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Health & Medicine Tracker</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563EB">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="main-header">
        <div class="container header-flex">
            <div>
                <h1>HealthTrack</h1>
                <p class="subtitle">ကြည်လင်ရှင်းတောက်သော ကျန်းမာရေးမှတ်တမ်း</p>
            </div>
            <div class="profile-avatar" aria-hidden="true">B</div>
        </div>
    </header>

    <section class="calendar-section container">
        <div class="calendar-strip" id="calendar-strip">
            </div>
    </section>

    <section class="summary-section container">
        <div class="summary-card shadow-soft">
            <span class="card-icon">💰</span>
            <div>
                <h3>ဆေးခန်းပြသမှုစရိတ်</h3>
                <p class="count-text"><span id="total-expense">0</span> ကျပ်</p>
            </div>
        </div>
        <div class="summary-card shadow-soft">
            <span class="card-icon">⏱️</span>
            <div>
                <h3>ယနေ့လေ့ကျင့်ခန်း</h3>
                <p class="count-text"><span id="total-exercise-time">0</span> မိနစ်</p>
            </div>
        </div>
    </section>

    <main class="container main-content">
        <div id="loading" class="loading-state">
            <div class="spinner"></div>
            <p>Supabase Cloud မှ ဒေတာများကို ရယူနေပါသည်...</p>
        </div>

        <div id="medicine-view" class="app-view">
            <div class="medicine-grid" id="medicine-grid">
                </div>
        </div>

        <div id="health-log-view" class="app-view hidden">
            <div class="log-sections-grid">
                <div class="log-card exercise-bg shadow-soft">
                    <div class="log-card-header">
                        <h2>🏋️ Home Exercise</h2>
                        <button class="btn-add-log" id="btn-add-exercise" aria-label="Add Exercise Record">+</button>
                    </div>
                    <ul class="log-list" id="exercise-list">
                        </ul>
                </div>

                <div class="log-card clinic-bg shadow-soft">
                    <div class="log-card-header">
                        <h2>🏥 ဆေးခန်းပြသမှုမှတ်တမ်း</h2>
                        <button class="btn-add-log" id="btn-add-clinic" aria-label="Add Clinic Visit Record">+</button>
                    </div>
                    <ul class="log-list" id="clinic-list">
                        </ul>
                </div>
            </div>
        </div>
    </main>

    <nav class="bottom-tab-bar">
        <button class="tab-item active" data-target="medicine-view" aria-label="Medicine List">
            <span class="tab-icon">💊</span>
            <span class="tab-label">ဆေးစာရင်း</span>
        </button>
        <button class="tab-item" data-target="health-log-view" aria-label="Health Logs">
            <span class="tab-icon">🏃</span>
            <span class="tab-label">ကျန်းမာရေး</span>
        </button>
    </nav>

    <script src="js/config.js"></script>
    <script src="js/supabase-db.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
